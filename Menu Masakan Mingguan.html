<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dapur Hijau — Menu Mingguanku</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --moss:       #2d4a2d;
  --forest:     #3d6b3d;
  --fern:       #5a8a5a;
  --sage:       #8aab7a;
  --mint:       #b8d4b0;
  --dew:        #e4f0e0;
  --mist:       #f0f7ed;
  --pebble:     #e8e0d4;
  --bark:       #6b5a3e;
  --cream:      #fafdf8;
  --gold-leaf:  #c8a84b;
  --sun:        #e8c44a;
  --water:      #7ab8c8;
  --sky:        #d4ecf4;
  --shadow:     rgba(45,74,45,0.13);
  --shadow-deep:rgba(45,74,45,0.22);
}

html{scroll-behavior:smooth}

body{
  font-family:'Nunito',sans-serif;
  background:var(--mist);
  color:var(--moss);
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}

/* ── LEAFY BACKGROUND ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 10%, rgba(90,138,90,0.12) 0%, transparent 55%),
    radial-gradient(ellipse 60% 70% at 85% 90%, rgba(122,184,200,0.10) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(184,212,176,0.08) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}

/* floating leaves */
.leaf{
  position:fixed;pointer-events:none;z-index:0;opacity:0.13;font-size:2rem;
  animation:drift linear infinite;
}
@keyframes drift{
  0%  {transform:translateY(-60px) rotate(0deg) translateX(0);}
  50% {transform:translateY(50vh)  rotate(180deg) translateX(30px);}
  100%{transform:translateY(105vh) rotate(360deg) translateX(-20px);}
}

/* ── WRAPPER ── */
.app{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:0 0 60px;}

/* ── HEADER ── */
header{
  background:linear-gradient(160deg, var(--moss) 0%, var(--forest) 60%, #4a7a5a 100%);
  padding:36px 28px 28px;
  text-align:center;
  position:relative;
  overflow:hidden;
  border-radius:0 0 32px 32px;
  box-shadow:0 8px 32px var(--shadow-deep);
}
header::before{
  content:'🌿';font-size:8rem;opacity:0.07;
  position:absolute;top:-20px;left:-20px;transform:rotate(-20deg);
}
header::after{
  content:'🌱';font-size:6rem;opacity:0.07;
  position:absolute;bottom:-10px;right:-10px;transform:rotate(15deg);
}
.header-icon{font-size:2.8rem;display:block;margin-bottom:8px;
  animation:sway 4s ease-in-out infinite;}
@keyframes sway{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}
header h1{
  font-family:'Cormorant Garamond',serif;
  font-size:2.2rem;font-weight:700;
  color:var(--dew);letter-spacing:0.02em;
  position:relative;z-index:1;line-height:1.1;
}
header h1 em{color:var(--sun);font-style:italic;}
header p{
  font-size:0.78rem;color:rgba(228,240,224,0.65);
  margin-top:7px;font-weight:300;
  letter-spacing:0.12em;text-transform:uppercase;
  position:relative;z-index:1;
}

/* ── ACTION BAR ── */
.action-bar{
  display:flex;gap:8px;padding:16px 16px 4px;
  justify-content:flex-end;flex-wrap:wrap;
}
.btn-action{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:999px;
  font-family:'Nunito',sans-serif;font-size:0.78rem;
  font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  cursor:pointer;border:none;transition:all 0.22s;
}
.btn-save{background:var(--forest);color:var(--dew);box-shadow:0 3px 10px rgba(61,107,61,0.25);}
.btn-save:hover{background:var(--moss);transform:translateY(-1px);box-shadow:0 5px 16px rgba(45,74,45,0.3);}
.btn-print{background:var(--pebble);color:var(--bark);}
.btn-print:hover{background:var(--mint);color:var(--moss);transform:translateY(-1px);}
.btn-reset{background:none;border:1.5px solid var(--mint)!important;color:var(--fern);}
.btn-reset:hover{background:var(--dew);transform:translateY(-1px);}

/* ── PROGRESS ── */
.progress-wrap{
  background:var(--cream);
  margin:10px 16px 4px;
  border-radius:16px;
  padding:14px 18px;
  border:1.5px solid var(--mint);
  box-shadow:0 2px 8px var(--shadow);
}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.progress-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1rem;font-weight:600;color:var(--forest);
}
.progress-count{
  font-size:0.78rem;font-weight:700;color:var(--fern);
  background:var(--dew);padding:3px 12px;border-radius:999px;
}
.bar-bg{height:10px;background:var(--dew);border-radius:999px;overflow:hidden;}
.bar-fill{
  height:100%;border-radius:999px;
  background:linear-gradient(90deg, var(--sage), var(--forest));
  transition:width 0.7s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.bar-fill::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:18px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35));
  border-radius:999px;
}

/* ── WEEK NAV ── */
.week-nav-wrap{
  display:flex;align-items:center;justify-content:center;
  gap:14px;padding:14px 16px 6px;
}
.week-arrow{
  width:36px;height:36px;border-radius:50%;
  border:1.5px solid var(--mint);background:var(--cream);
  color:var(--fern);font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.2s;box-shadow:0 2px 6px var(--shadow);
}
.week-arrow:hover{background:var(--forest);color:var(--dew);border-color:var(--forest);}
.week-label{
  font-family:'Cormorant Garamond',serif;
  font-size:1.05rem;font-weight:600;color:var(--moss);
  min-width:170px;text-align:center;
}

/* ── DAYS GRID ── */
.days-grid{display:flex;flex-direction:column;gap:10px;padding:10px 16px 8px;}

/* ── DAY CARD ── */
.day-card{
  background:var(--cream);
  border:1.5px solid var(--mint);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 2px 10px var(--shadow);
  transition:box-shadow 0.25s, transform 0.2s;
  animation:fadeUp 0.4s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.day-card:hover{box-shadow:0 6px 22px var(--shadow-deep);transform:translateY(-2px);}

.day-card.done{
  background:linear-gradient(135deg,#eef8eb 0%,#f5fdf3 100%);
  border-color:var(--sage);
}

.card-head{
  display:flex;align-items:center;padding:11px 15px;
  gap:10px;border-bottom:1px solid var(--dew);
  background:rgba(228,240,224,0.35);
}
.day-card.done .card-head{border-bottom-color:rgba(138,171,122,0.3);background:rgba(184,212,176,0.25);}

.day-pill{
  font-family:'Cormorant Garamond',serif;
  font-size:0.72rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;
  background:var(--forest);color:var(--dew);
  padding:3px 12px;border-radius:999px;white-space:nowrap;
}
.day-card.done .day-pill{background:var(--fern);}
.day-emoji{font-size:1.1rem;line-height:1;}
.day-date{font-size:0.73rem;color:var(--fern);flex:1;font-weight:400;}
.done-tag{
  font-size:0.68rem;font-weight:700;letter-spacing:0.08em;
  color:var(--forest);background:var(--mint);
  padding:2px 9px;border-radius:999px;
  display:none;align-items:center;gap:3px;
}
.done-tag::before{content:'✓';}
.day-card.done .done-tag{display:flex;}

.card-body{padding:12px 15px;}
.input-row{display:flex;gap:10px;align-items:center;}

.menu-input{
  flex:1;border:1.5px solid var(--mint);border-radius:12px;
  padding:10px 14px;
  font-family:'Nunito',sans-serif;font-size:0.92rem;
  color:var(--moss);background:var(--mist);
  outline:none;transition:border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
.menu-input:focus{
  border-color:var(--fern);
  box-shadow:0 0 0 3px rgba(90,138,90,0.15);
  background:var(--cream);
}
.menu-input::placeholder{color:#a8c4a0;font-style:italic;}
.day-card.done .menu-input{
  background:#eef8eb;border-color:var(--sage);
  color:var(--forest);font-weight:700;
}

/* CHECK BUTTON */
.check-btn{
  width:46px;height:46px;flex-shrink:0;
  border-radius:14px;border:2px solid var(--mint);
  background:var(--mist);color:#a8c4a0;font-size:1.4rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.25s cubic-bezier(.4,0,.2,1);
}
.check-btn:hover:not(:disabled){
  border-color:var(--fern);background:var(--dew);color:var(--forest);
  transform:scale(1.1) rotate(-5deg);
}
.day-card.done .check-btn{
  background:var(--forest);border-color:var(--forest);color:white;
  transform:scale(1);
}
.day-card.done .check-btn:hover{
  background:var(--moss);transform:scale(1.08) rotate(5deg);
}

/* NOTE ROW */
.note-row{
  display:flex;align-items:center;gap:7px;
  margin-top:8px;
}
.note-row span{font-size:0.85rem;color:var(--sage);}
.note-input{
  flex:1;border:none;background:none;outline:none;
  font-family:'Nunito',sans-serif;font-size:0.78rem;
  color:var(--bark);
  border-bottom:1px dashed var(--mint);
  padding:2px 4px;transition:border-color 0.2s;
}
.note-input:focus{border-bottom-color:var(--fern);}
.note-input::placeholder{color:#b8d4b0;font-style:italic;}

/* ── SAVE MODAL ── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(45,74,45,0.55);
  backdrop-filter:blur(6px);
  z-index:200;
  display:none;align-items:center;justify-content:center;
  padding:20px;
  animation:fadeIn 0.2s ease;
}
.modal-overlay.open{display:flex;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{
  background:var(--cream);
  border-radius:24px;
  padding:28px 24px;
  max-width:380px;width:100%;
  box-shadow:0 20px 60px rgba(45,74,45,0.3);
  position:relative;
  animation:slideUp 0.3s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-icon{text-align:center;font-size:2.5rem;margin-bottom:12px;}
.modal h3{
  font-family:'Cormorant Garamond',serif;
  font-size:1.4rem;font-weight:700;color:var(--moss);
  text-align:center;margin-bottom:6px;
}
.modal p{font-size:0.83rem;color:var(--fern);text-align:center;margin-bottom:20px;}
.modal-options{display:flex;flex-direction:column;gap:10px;}
.modal-btn{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;border-radius:14px;border:1.5px solid var(--mint);
  background:var(--mist);cursor:pointer;
  transition:all 0.2s;font-family:'Nunito',sans-serif;
  text-align:left;
}
.modal-btn:hover{background:var(--dew);border-color:var(--fern);transform:translateX(4px);}
.modal-btn-icon{font-size:1.5rem;}
.modal-btn-text strong{display:block;font-size:0.88rem;font-weight:700;color:var(--moss);}
.modal-btn-text small{font-size:0.75rem;color:var(--fern);}
.modal-close{
  position:absolute;top:14px;right:16px;
  background:none;border:none;font-size:1.3rem;
  color:var(--sage);cursor:pointer;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:background 0.2s;
}
.modal-close:hover{background:var(--dew);}

/* ── PRINT PREVIEW MODAL ── */
.print-modal{
  position:fixed;inset:0;
  background:rgba(45,74,45,0.6);
  backdrop-filter:blur(8px);
  z-index:300;
  display:none;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding:20px;overflow-y:auto;
}
.print-modal.open{display:flex;}
.print-sheet{
  background:white;
  width:100%;max-width:600px;
  border-radius:16px;
  padding:40px 36px;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
  margin-bottom:20px;
}
.print-close-bar{
  display:flex;gap:10px;margin-bottom:12px;width:100%;max-width:600px;
}
.pbar-btn{
  padding:9px 20px;border-radius:999px;border:none;
  font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:700;
  cursor:pointer;transition:all 0.2s;
}
.pbar-dl{background:var(--forest);color:white;}
.pbar-dl:hover{background:var(--moss);}
.pbar-cl{background:var(--pebble);color:var(--bark);}
.pbar-cl:hover{background:var(--mint);}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--moss);color:var(--dew);
  padding:11px 24px;border-radius:999px;
  font-size:0.84rem;font-weight:700;letter-spacing:0.04em;
  box-shadow:0 8px 24px rgba(45,74,45,0.35);
  transition:transform 0.4s cubic-bezier(.4,0,.2,1),opacity 0.4s;
  opacity:0;z-index:500;pointer-events:none;
  display:flex;align-items:center;gap:8px;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ── CONFETTI ── */
.cf{
  position:fixed;pointer-events:none;z-index:400;
  width:9px;height:9px;border-radius:2px;
  animation:cffall 1.1s ease-in forwards;
}
@keyframes cffall{
  0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1);}
  100%{opacity:0;transform:translateY(220px) rotate(540deg) scale(0.5);}
}

/* ── PRINT CSS ── */
@media print{
  body{background:white!important;}
  header,
  .action-bar,
  .week-nav-wrap,
  .modal-overlay,
  .print-modal,
  .toast,
  .leaf{display:none!important;}
  .app{max-width:100%;}
  .days-grid{gap:6px;}
  .day-card{break-inside:avoid;}
}
</style>
</head>
<body>

<!-- floating leaves -->
<div class="leaf" style="left:8%;animation-duration:18s;animation-delay:0s;font-size:1.5rem;">🍃</div>
<div class="leaf" style="left:25%;animation-duration:24s;animation-delay:5s;font-size:1.1rem;">🌿</div>
<div class="leaf" style="left:60%;animation-duration:20s;animation-delay:2s;font-size:1.8rem;">🍃</div>
<div class="leaf" style="left:80%;animation-duration:15s;animation-delay:8s;font-size:1rem;">🌱</div>
<div class="leaf" style="left:45%;animation-duration:28s;animation-delay:12s;font-size:1.3rem;">🍀</div>

<div class="app">

  <!-- HEADER -->
  <header>
    <span class="header-icon">🌿</span>
    <h1>Dapur <em>Hijau</em></h1>
    <p>Menu Mingguanku · Alam & Kesederhanaan</p>
  </header>

  <!-- ACTION BAR -->
  <div class="action-bar">
    <button class="btn-action btn-save" onclick="openSaveModal()">💾 Simpan</button>
    <button class="btn-action btn-print" onclick="openPrintPreview()">🖨️ Cetak</button>
    <button class="btn-action btn-reset" onclick="resetChecks()">↺ Reset</button>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-top">
      <span class="progress-title">🌱 Progress Memasak</span>
      <span class="progress-count" id="prog-text">0 / 7 hari</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" id="prog-bar" style="width:0%"></div></div>
  </div>

  <!-- WEEK NAV -->
  <div class="week-nav-wrap">
    <button class="week-arrow" onclick="changeWeek(-1)">&#8592;</button>
    <span class="week-label" id="week-label">—</span>
    <button class="week-arrow" onclick="changeWeek(1)">&#8594;</button>
  </div>

  <!-- DAYS GRID -->
  <div class="days-grid" id="days-grid"></div>

</div><!-- /app -->

<!-- SAVE MODAL -->
<div class="modal-overlay" id="save-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeSaveModal()">✕</button>
    <div class="modal-icon">💾</div>
    <h3>Simpan Menu</h3>
    <p>Pilih format untuk menyimpan menu minggu ini</p>
    <div class="modal-options">
      <button class="modal-btn" onclick="saveAsJSON()">
        <span class="modal-btn-icon">📋</span>
        <span class="modal-btn-text">
          <strong>Simpan Data (JSON)</strong>
          <small>Backup semua data, bisa di-load kembali</small>
        </span>
      </button>
      <button class="modal-btn" onclick="saveAsText()">
        <span class="modal-btn-icon">📝</span>
        <span class="modal-btn-text">
          <strong>Simpan sebagai Teks (.txt)</strong>
          <small>Ringkasan menu minggu ini</small>
        </span>
      </button>
      <button class="modal-btn" onclick="loadFromFile()">
        <span class="modal-btn-icon">📂</span>
        <span class="modal-btn-text">
          <strong>Muat Data dari File</strong>
          <small>Buka file backup JSON yang pernah disimpan</small>
        </span>
      </button>
    </div>
  </div>
</div>

<!-- hidden file input -->
<input type="file" id="file-input" accept=".json" style="display:none" onchange="handleFileLoad(event)"/>

<!-- PRINT MODAL -->
<div class="print-modal" id="print-modal">
  <div class="print-close-bar">
    <button class="pbar-btn pbar-dl" onclick="downloadPrintHTML()">⬇ Unduh HTML</button>
    <button class="pbar-btn pbar-cl" onclick="closePrintModal()">✕ Tutup</button>
  </div>
  <div class="print-sheet" id="print-sheet"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const DAYS = ['Senin','Selasa','Rabu','Kamis','Jumat','Sabtu','Minggu'];
const EMOJIS = ['☀️','🌤️','🌿','🌧️','🌸','🌻','🌙'];
let weekOffset = 0;

/* ── UTILS ── */
function getMonday(offset=0){
  const d = new Date();
  const day = d.getDay();
  const diff = day===0 ? -6 : 1-day;
  d.setDate(d.getDate()+diff+offset*7);
  d.setHours(0,0,0,0);
  return d;
}
function fmt(d){return d.toLocaleDateString('id-ID',{day:'numeric',month:'short'});}
function weekKey(offset){
  const m=getMonday(offset);
  return `dapurhijau_${m.getFullYear()}_${String(m.getMonth()+1).padStart(2,'0')}_${String(m.getDate()).padStart(2,'0')}`;
}
function loadData(offset){
  const raw=localStorage.getItem(weekKey(offset));
  return raw?JSON.parse(raw):DAYS.map(()=>({menu:'',note:'',done:false}));
}
function saveData(offset,data){localStorage.setItem(weekKey(offset),JSON.stringify(data));}

/* ── PROGRESS ── */
function updateProgress(data){
  const n=data.filter(d=>d.done).length;
  const pct=Math.round(n/7*100);
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`${n} / 7 hari`;
}

/* ── RENDER ── */
function render(){
  const key=weekOffset; // reuse variable
  const data=loadData(weekOffset);
  const monday=getMonday(weekOffset);
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);
  document.getElementById('week-label').textContent=`${fmt(monday)} – ${fmt(sunday)}`;

  const grid=document.getElementById('days-grid');
  grid.innerHTML='';

  DAYS.forEach((day,i)=>{
    const date=new Date(monday);date.setDate(monday.getDate()+i);
    const d=data[i];

    const card=document.createElement('div');
    card.className='day-card'+(d.done?' done':'');
    card.style.animationDelay=(i*0.06)+'s';

    card.innerHTML=`
      <div class="card-head">
        <span class="day-pill">${day}</span>
        <span class="day-emoji">${EMOJIS[i]}</span>
        <span class="day-date">${fmt(date)}</span>
        <span class="done-tag">Sudah masak!</span>
      </div>
      <div class="card-body">
        <div class="input-row">
          <input class="menu-input" type="text"
            placeholder="Tulis menu hari ${day}…"
            value="${escHtml(d.menu)}"
            ${d.done?'readonly':''} />
          <button class="check-btn" title="${d.done?'Batalkan centang':'Tandai sudah masak'}">
            ${d.done?'✓':'🌿'}
          </button>
        </div>
        <div class="note-row">
          <span>📝</span>
          <input class="note-input" type="text"
            placeholder="Catatan (bahan, tips, dll)…"
            value="${escHtml(d.note)}"
            ${d.done?'readonly':''}/>
        </div>
      </div>`;

    card.querySelector('.menu-input').addEventListener('input',e=>{
      data[i].menu=e.target.value;
      saveData(key,data);
    });
    card.querySelector('.note-input').addEventListener('input',e=>{
      data[i].note=e.target.value;
      saveData(key,data);
    });
    card.querySelector('.check-btn').addEventListener('click',e=>{
      if(!data[i].menu.trim()){
        showToast('🌱 Isi dulu nama menu-nya ya!');
        card.querySelector('.menu-input').focus();
        return;
      }
      data[i].done=!data[i].done;
      saveData(key,data);
      if(data[i].done){
        const r=e.target.getBoundingClientRect();
        confetti(r.left+r.width/2, r.top+r.height/2);
        showToast(`🌿 ${day}: "${data[i].menu}" sudah dimasak!`);
      } else {
        showToast(`↩️ ${day}: ditandai belum dimasak`);
      }
      render();
    });

    grid.appendChild(card);
  });
  updateProgress(data);
}

/* ── WEEK NAV ── */
function changeWeek(dir){weekOffset+=dir;render();}

/* ── RESET ── */
function resetChecks(){
  const data=loadData(weekOffset);
  if(!data.some(d=>d.done)){showToast('🌱 Belum ada yang dicentang!');return;}
  data.forEach(d=>d.done=false);
  saveData(weekOffset,data);
  showToast('↺ Semua centang direset');
  render();
}

/* ── SAVE MODAL ── */
function openSaveModal(){document.getElementById('save-modal').classList.add('open');}
function closeSaveModal(){document.getElementById('save-modal').classList.remove('open');}
document.getElementById('save-modal').addEventListener('click',function(e){if(e.target===this)closeSaveModal();});

function saveAsJSON(){
  const monday=getMonday(weekOffset);
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);
  const allKeys=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k.startsWith('dapurhijau_'))allKeys.push(k);
  }
  const allData={};
  allKeys.forEach(k=>{allData[k]=JSON.parse(localStorage.getItem(k));});
  const blob=new Blob([JSON.stringify(allData,null,2)],{type:'application/json'});
  dlBlob(blob,`dapur-hijau-backup-${fmt(monday).replace(' ','-')}.json`);
  showToast('💾 Data berhasil disimpan sebagai JSON!');
  closeSaveModal();
}

function saveAsText(){
  const data=loadData(weekOffset);
  const monday=getMonday(weekOffset);
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);
  let txt=`🌿 MENU MINGGUANKU — DAPUR HIJAU\n`;
  txt+=`Periode: ${fmt(monday)} – ${fmt(sunday)}\n`;
  txt+=`${'─'.repeat(35)}\n\n`;
  DAYS.forEach((day,i)=>{
    const date=new Date(monday);date.setDate(monday.getDate()+i);
    const d=data[i];
    const status=d.done?'[✓ Sudah masak]':'[  Belum masak ]';
    txt+=`${EMOJIS[i]} ${day.padEnd(7)} (${fmt(date)})  ${status}\n`;
    txt+=`   Menu  : ${d.menu||'(belum diisi)'}\n`;
    if(d.note)txt+=`   Catatan: ${d.note}\n`;
    txt+='\n';
  });
  const done=data.filter(d=>d.done).length;
  txt+=`${'─'.repeat(35)}\n`;
  txt+=`Progress: ${done}/7 hari sudah dimasak 🌿\n`;
  const blob=new Blob([txt],{type:'text/plain'});
  dlBlob(blob,`menu-minggu-${fmt(monday).replace(' ','-')}.txt`);
  showToast('📝 Menu disimpan sebagai teks!');
  closeSaveModal();
}

function loadFromFile(){
  document.getElementById('file-input').click();
  closeSaveModal();
}
function handleFileLoad(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      let count=0;
      Object.keys(data).forEach(k=>{
        if(k.startsWith('dapurhijau_')){
          localStorage.setItem(k,JSON.stringify(data[k]));
          count++;
        }
      });
      showToast(`📂 ${count} minggu berhasil dimuat!`);
      render();
    }catch{showToast('⚠️ File tidak valid!');}
  };
  reader.readAsText(file);
  e.target.value='';
}

function dlBlob(blob,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),3000);
}

/* ── PRINT PREVIEW ── */
function openPrintPreview(){
  const data=loadData(weekOffset);
  const monday=getMonday(weekOffset);
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);

  let rows='';
  DAYS.forEach((day,i)=>{
    const date=new Date(monday);date.setDate(monday.getDate()+i);
    const d=data[i];
    rows+=`<tr style="background:${d.done?'#eef8eb':'white'}">
      <td style="padding:10px 12px;font-weight:700;color:#3d6b3d;border-bottom:1px solid #e4f0e0;white-space:nowrap">${EMOJIS[i]} ${day}<br><span style="font-weight:400;font-size:0.75rem;color:#8aab7a">${fmt(date)}</span></td>
      <td style="padding:10px 12px;border-bottom:1px solid #e4f0e0;color:#2d4a2d">${d.menu||'<em style="color:#b8d4b0">Belum diisi</em>'}</td>
      <td style="padding:10px 12px;border-bottom:1px solid #e4f0e0;font-size:0.82rem;color:#6b5a3e">${d.note||'—'}</td>
      <td style="padding:10px 12px;border-bottom:1px solid #e4f0e0;text-align:center;font-size:1.2rem">${d.done?'✅':'⬜'}</td>
    </tr>`;
  });
  const done=data.filter(d=>d.done).length;

  document.getElementById('print-sheet').innerHTML=`
    <div style="text-align:center;margin-bottom:24px;border-bottom:2px solid #b8d4b0;padding-bottom:18px">
      <div style="font-size:2.5rem">🌿</div>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.9rem;color:#2d4a2d;margin:4px 0">Dapur Hijau</h2>
      <p style="color:#5a8a5a;font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase">Menu Mingguanku</p>
      <p style="color:#8aab7a;font-size:0.8rem;margin-top:6px">${fmt(monday)} – ${fmt(sunday)}</p>
    </div>
    <table style="width:100%;border-collapse:collapse;font-family:'Nunito',sans-serif;font-size:0.88rem">
      <thead>
        <tr style="background:#2d4a2d;color:#e4f0e0">
          <th style="padding:10px 12px;text-align:left;border-radius:8px 0 0 0">Hari</th>
          <th style="padding:10px 12px;text-align:left">Menu Masakan</th>
          <th style="padding:10px 12px;text-align:left">Catatan</th>
          <th style="padding:10px 12px;text-align:center;border-radius:0 8px 0 0">Status</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:20px;padding:12px 16px;background:#f0f7ed;border-radius:10px;
      border-left:4px solid #5a8a5a;font-size:0.85rem;color:#3d6b3d">
      🌱 Progress: <strong>${done}/7 hari</strong> sudah dimasak •
      Dicetak pada: ${new Date().toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
    </div>`;

  document.getElementById('print-modal').classList.add('open');
}
function closePrintModal(){document.getElementById('print-modal').classList.remove('open');}
function downloadPrintHTML(){
  const sheet=document.getElementById('print-sheet').innerHTML;
  const full=`<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Nunito',sans-serif;padding:40px;max-width:700px;margin:auto;background:white;}
@media print{body{padding:20px;}}</style>
</head><body>${sheet}</body></html>`;
  const blob=new Blob([full],{type:'text/html'});
  dlBlob(blob,'menu-minggu-cetak.html');
  showToast('🖨️ File cetak berhasil diunduh!');
}

/* ── TOAST ── */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);
}

/* ── CONFETTI ── */
function confetti(x,y){
  const cols=['#5a8a5a','#c8a84b','#7ab8c8','#e4f0e0','#2d4a2d','#b8d4b0','#e8c44a'];
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='cf';
    el.style.cssText=`left:${x-20+Math.random()*40}px;top:${y-10}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      animation-delay:${Math.random()*0.25}s;
      border-radius:${Math.random()>0.5?'50%':'2px'};`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1400);
  }
}

/* ── HTML ESCAPE ── */
function escHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* INIT */
render();
